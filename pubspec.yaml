name: flutter_starter_kit
description:
  A Flutter + Firebase starter kit with auth, paywall, onboarding, and more.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & Navigation
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.2
  firebase_analytics: ^11.4.2

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1

  # Payments
  purchases_flutter: ^9.13.1

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4 # For sensitive data (user tokens, secrets)

  # Storage & Media
  firebase_storage: ^12.4.4
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI
  url_launcher: ^6.3.1
  package_info_plus: ^8.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  riverpod_lint: ^2.6.4
  custom_lint: ^0.7.5
  fake_cloud_firestore: ^3.1.0

flutter:
  generate: true
  uses-material-design: true
